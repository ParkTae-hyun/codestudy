<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빡태 제주 임장기 🌴</title>
    <style>
        /* 모바일 퍼스트 & 제주도 감성 디자인 */
        body {
            background-color: #f7f9fa; /* 깔끔한 연회색 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* 모바일 화면 최적화 사이즈 */
            background-color: #ffffff;
            padding: 30px 20px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 상단 타이틀 영역 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: linear-gradient(135deg, #ff9f43, #ffbe76); /* 따뜻한 감귤색 포인트 */
            border-radius: 16px;
            color: white;
        }

        .header h1 {
            font-size: 22px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            margin: 0;
            opacity: 0.9;
        }

        /* 카테고리 제목 */
        .category-title {
            font-size: 15px;
            font-weight: bold;
            color: #84817a;
            margin: 20px 0 10px 4px;
        }

        /* 링크 버튼 목록 */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 한 손 터치가 편한 큼직한 버튼 */
        .link-item {
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
            color: #2c3e50;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid #edeef0;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 파란 잔상 제거 */
        }

        /* 모바일에서 손가락으로 누르고 있을 때 반응 */
        .link-item:active {
            background-color: #e9ecef;
            transform: scale(0.98);
        }

        .icon {
            font-size: 20px;
            margin-right: 12px;
        }
    </style>
</head>
<body>

<div class="container">
        <!-- 타이틀 -->
        <div class="header">
            <h1>JEJU TRAVEL MAP 🌴</h1>
            <p>빡태 제주 여정을 위한 링크 모음</p>
        </div>

        <!-- 카테고리 1 -->
        <div class="category-title">📍 코스 및 지도 정보</div>
        <div class="link-list">
            <a href="https://www.jejuolle.org" target="_blank" class="link-item">
                <span class="icon">🚶‍♂️</span> 제주올레 공식 홈페이지 (코스 안내)
            </a>
            <a href="https://map.kakao.com" target="_blank" class="link-item">
                <span class="icon">🗺️</span> 카카오맵 바로가기
            </a>
        </div>

        <!-- 카테고리 2 -->
        <div class="category-title">🏡 숙소 및 렌터카 정보</div>
        <div class="link-list">
            <!-- 에어비앤비 공식 웹사이트로 이동 -->
            <a href="https://www.airbnb.co.kr" target="_blank" class="link-item">
                <span class="icon">🏠</span> 에어비앤비 (숙소 확인)
            </a>
            <!-- 모바일에서 돌하루팡 앱을 실행하거나 설치 페이지로 연동하는 딥링크 -->
            <a href="https://www.dolharupang.com" target="_blank" class="link-item">
                <span class="icon">🚗</span> 돌하루팡 (렌터카 가격비교)
            </a>
        </div>

        <!-- 카테고리 3 -->
        <div class="category-title">🌤️ 실시간 날씨 정보</div>
        <div class="link-list">
            <a href="https://m.weather.naver.com" target="_blank" class="link-item">
                <span class="icon">🌦️</span> 네이버 날씨 (제주 지역)
            </a>
        </div>

        <!-- 카테고리 4 -->
        <div class="category-title">📝 나의 여행 메모</div>
        <div class="link-list">
            <a href="https://keep.google.com" target="_blank" class="link-item">
                <span class="icon">📌</span> 준비물 및 숙소 체크리스트
            </a>
        </div>
    </div>

</body>
</html>
