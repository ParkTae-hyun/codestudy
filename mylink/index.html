<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 링크 모음</title>
    <style>
        /* 배경 및 기본 폰트 설정 */
body {
    background-color: #f4f7f6; /* 부드러운 회색/민트빛 배경 */
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 전체를 감싸는 프로필 카드 상자 */
.container {
    background-color: #ffffff;
    width: 100%;
    max-width: 450px; /* 모바일 화면 크기에 최적화 */
    margin: 20px;
    padding: 40px 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* 은은한 그림자 */
    text-align: center;
}

/* 프로필 이미지 동그랗게 꾸미기 */
.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid #e0e0e0;
    margin-bottom: 15px;
}

.profile h1 {
    font-size: 24px;
    color: #2c3e50;
    margin: 0 0 8px 0;
}

.profile p {
    font-size: 14px;
    color: #7f8c8d;
    margin-bottom: 30px;
}

/* 링크 버튼들을 아래로 나열 */
.links {
    display: flex;
    flex-direction: column;
    gap: 16px; /* 버튼 사이의 간격 */
}

/* 개별 링크 버튼 디자인 */
.link-btn {
    background-color: #ffffff;
    color: #2c3e50;
    text-decoration: none; /* 밑줄 제거 */
    padding: 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-weight: bold;
    font-size: 15px;
    transition: all 0.3s ease; /* 마우스 올렸을 때 부드러운 효과 */
}

/* 마우스를 올렸을 때(Hover) 변하는 효과 */
.link-btn:hover {
    background-color: #2c3e50; /* 버튼 색상이 어둡게 변경 */
    color: #ffffff;            /* 글자 색상은 흰색으로 */
    border-color: #2c3e50;
    transform: translateY(-3px); /* 버튼이 살짝 위로 떠오름 */
    box-shadow: 0 5px 15px rgba(44, 62, 80, 0.2);
}
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="https://via.placeholder.com/100" alt="프로필 사진" class="profile-img">
            <h1>재야의 개발자</h1>
            <p>꾸준히 성장하는 코딩 새내기의 공간입니다. 🚀</p>
        </div>

        <div class="links">
            <a href="https://github.com" target="_blank" class="link-btn">💻 나의 GitHub 방문하기</a>
            <a href="https://velog.io" target="_blank" class="link-btn">✍️ 기술 블로그 구경가기</a>
            <a href="https://www.google.com" target="_blank" class="link-btn">📊 관심 있는 투자 포트폴리오</a>
            <a href="mailto:your-email@example.com" class="link-btn">✉️ 연락하기 (Email)</a>
        </div>
    </div>

</body>
</html>
