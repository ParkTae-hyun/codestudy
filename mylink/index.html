<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 제주 여행 맵 🌴</title>
    <style>
        /* 모바일 퍼스트 & 제주도 감성 디자인 */
        body {
            background-color: #f7f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: #ffffff;
            padding: 30px 20px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative; /* 알림창 위치 기준점 */
        }

        /* 상단 타이틀 영역 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            background: linear-gradient(135deg, #ff9f43, #ffbe76);
            border-radius: 16px;
            color: white;
            position: relative;
        }

        .header h1 {
            font-size: 22px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            margin: 0;
            opacity: 0.9;
        }

        /* 우측 상단 URL 복사 아이콘 버튼 */
        .share-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 16px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .share-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* 카테고리 제목 */
        .category-title {
            font-size: 15px;
            font-weight: bold;
            color: #84817a;
            margin: 20px 0 10px 4px;
        }

        /* 링크 버튼 목록 */
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 한 손 터치가 편한 큼직한 버튼 */
        .link-item {
            display: flex;
            align-items: center;
            background-color: #f8f9fa;
            color: #2c3e50;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 12px;
            border: 1px solid #edeef0;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .link-item:active {
            background-color: #e9ecef;
            transform: scale(0.98);
        }

        .icon {
            font-size: 20px;
            margin-right: 12px;
        }

        /* 복사 완료 토스트 알림창 디자인 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 51%;
            transform: translateX(-50%);
            background-color: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 타이틀 -->
        <div class="header">
            <h1>JEJU TRAVEL MAP 🌴</h1>
            <p>빡태 제주 여정을 위한 링크 모음</p>
            
            <!-- 🔗 URL 복사 버튼 추가 -->
            <button class="share-btn" onclick="copyPageUrl()" title="주소 복사">
                🔗
            </button>
        </div>

        <!-- 카테고리 1 -->
        <div class="category-title">📍 코스 및 지도 정보</div>
        <div class="link-list">
            <a href="https://www.jejuolle.org" target="_blank" class="link-item">
                <span class="icon">🚶‍♂️</span> 제주올레 공식 홈페이지 (코스 안내)
            </a>
            <a href="https://map.kakao.com" target="_blank" class="link-item">
                <span class="icon">🗺️</span> 카카오맵 바로가기
            </a>
        </div>

        <!-- 카테고리 2 -->
        <div class="category-title">🏡 숙소 및 렌터카 정보</div>
        <div class="link-list">
            <a href="https://www.airbnb.co.kr" target="_blank" class="link-item">
                <span class="icon">🏠</span> 에어비앤비 (숙소 확인)
            </a>
            <a href="https://www.dolharupang.com" target="_blank" class="link-item">
                <span class="icon">🚗</span> 돌하루팡 (렌터카 가격비교)
            </a>
        </div>

        <!-- 카테고리 3 -->
        <div class="category-title">🌤️ 실시간 날씨 정보</div>
        <div class="link-list">
            <a href="https://m.weather.naver.com" target="_blank" class="link-item">
                <span class="icon">🌦️</span> 네이버 날씨 (제주 지역)
            </a>
        </div>

        <!-- 카테고리 4 -->
        <div class="category-title">📝 나의 여행 메모</div>
        <div class="link-list">
            <a href="https://keep.google.com" target="_blank" class="link-item">
                <span class="icon">📌</span> 준비물 및 숙소 체크리스트
            </a>
        </div>

        <!-- 복사 완료 안내 메시지 상자 -->
        <div id="toast" class="toast">링크가 클립보드에 복사되었습니다! 👍</div>
    </div>

    <!-- 주소 복사 기능을 담당하는 자바스크립트 코드 -->
    <script>
        function copyPageUrl() {
            // 현재 브라우저의 주소창 URL을 통째로 가져옵니다.
            const currentUrl = window.location.href;

            // 스마트폰 및 PC의 클립보드로 복사하는 최신 명령어
            navigator.clipboard.writeText(currentUrl).then(() => {
                // 복사가 성공하면 안내창(Toast)을 띄웁니다.
                const toast = document.getElementById("toast");
                toast.classList.add("show");

                // 2초 뒤에 안내창을 부드럽게 숨깁니다.
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2000);
            }).catch(err => {
                console.error("복사 실패했습니다: ", err);
            });
        }
    </script>

</body>
</html>
